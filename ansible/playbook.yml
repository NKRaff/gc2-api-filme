- name: Instalar Docker e subir aplicação 
  hosts: servers
  become: yes

  tasks:
    - name: Atualizar cache do apt
      ansible.builtin.apt:
        update_cache: yes

    - name: Instalar dependências
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Criar diretório de keyrings
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Baixar chave GPG do Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /tmp/docker.asc
        mode: '0644'

    - name: Converter chave para formato gpg
      ansible.builtin.command:
        cmd: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.asc
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Ajustar permissão da chave
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Adicionar repositório do Docker
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: Atualizar cache após adicionar repositório
      ansible.builtin.apt:
        update_cache: yes

    - name: Instalar Docker
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Instalar dependência Python para Docker
      ansible.builtin.apt:
        name: python3-docker
        state: present

    - name: Build da imagem Docker
      community.docker.docker_image:
        name: "gc2-api-filme"
        build:
          path: "/vagrant"
        source: build

    - name: Subir container
      community.docker.docker_container:
        name: "gc2-api-filme"
        image: "gc2-api-filme"
        state: started
        restart_policy: always
        container_default_behavior: no_defaults
        ports:
          - "3000:3000"
        env_file: "/vagrant/.env"