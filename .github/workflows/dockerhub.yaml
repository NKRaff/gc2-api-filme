name: DockerHub

on: 
  push:
    branches:
      - main
  pull_request: 
    branches:
      - main

jobs:
  push-docker-image:
    runs-on: ubuntu-latest
    steps:
      - name: Clonando o repositorio e trocando para a branch correta
        uses: actions/checkout@v4

      - name: Construindo imagem Docker
        uses: docker build -t gc2-api-filme .

      - name: Fazendo login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Buildando e publicando imagem no DockerHub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: nkraff/gc2-api-filme:latest